name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tessellation_version:
        description: 'Tessellation version override (e.g., v4.0.0-rc.6)'
        required: false
        type: string

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'sbt'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install just
        uses: extractions/setup-just@v3

      # Resolve tessellation version from the dependency chain:
      #   ottochain → metakit (version in Dependencies.scala)
      #   metakit POM on Maven Central → tessellation-sdk version
      - name: Resolve tessellation version
        id: versions
        run: |
          METAKIT_VER=$(grep 'val metakit =' project/Dependencies.scala | head -1 | grep -o '"[^"]*"' | tr -d '"')
          echo "metakit=${METAKIT_VER}" >> $GITHUB_OUTPUT

          # Allow workflow_dispatch override
          if [ -n "${{ inputs.tessellation_version }}" ]; then
            TESS_VER="${{ inputs.tessellation_version }}"
            TESS_VER="${TESS_VER#v}"
            echo "tessellation=${TESS_VER}" >> $GITHUB_OUTPUT
            echo "Dependency chain: ottochain → metakit ${METAKIT_VER} → tessellation ${TESS_VER} (override)"
          else
            # Resolve from metakit POM on Maven Central
            TESS_VER=$(curl -sf "https://repo1.maven.org/maven2/io/constellationnetwork/metakit_2.13/${METAKIT_VER}/metakit_2.13-${METAKIT_VER}.pom" \
              | grep -A1 'tessellation-sdk' | grep '<version>' | grep -o '[0-9][^<]*')
            echo "tessellation=${TESS_VER}" >> $GITHUB_OUTPUT
            echo "Dependency chain: ottochain → metakit ${METAKIT_VER} → tessellation ${TESS_VER}"
          fi

      # Clone tessellation develop for Docker infrastructure (compose-runner, Dockerfiles, scripts).
      # Develop has the latest compose-runner with SKIP_ASSEMBLY support for pre-staged JARs.
      # We do NOT build tessellation — all deps resolve from Maven Central.
      - name: Clone tessellation infrastructure
        run: |
          git clone --depth 1 --branch develop \
            https://github.com/Constellation-Labs/tessellation.git tessellation

      # Download pre-built GL0/GL1/keytool/wallet JARs from tessellation GitHub release.
      # metakit and tessellation-sdk resolve from Maven Central via sbt — no publishLocal needed.
      - name: Download tessellation release JARs
        run: |
          TESS_TAG="v${{ steps.versions.outputs.tessellation }}"
          REPO="Constellation-Labs/tessellation"
          BASE_URL="https://github.com/${REPO}/releases/download/${TESS_TAG}"
          JARS_DIR="tessellation/docker/jars"
          mkdir -p "$JARS_DIR"

          echo "Downloading tessellation JARs from release ${TESS_TAG}..."
          declare -A JAR_MAP=(
            ["cl-node.jar"]="gl0.jar"
            ["cl-dag-l1.jar"]="gl1.jar"
            ["cl-keytool.jar"]="keytool.jar"
            ["cl-wallet.jar"]="wallet.jar"
          )

          for release_name in "${!JAR_MAP[@]}"; do
            local_name="${JAR_MAP[$release_name]}"
            echo "  ${release_name} → ${local_name}"
            curl -fsSL -o "${JARS_DIR}/${local_name}" "${BASE_URL}/${release_name}"
            echo "    ✓ $(stat -c%s "${JARS_DIR}/${local_name}") bytes"
          done
          ls -la "$JARS_DIR"

      # Only build ottochain metagraph JARs from source.
      # metakit + tessellation-sdk are resolved from Maven Central.
      - name: Build metagraph JARs
        run: sbt --error "currencyL0/assembly" "currencyL1/assembly" "dataL1/assembly"

      - name: Stage metagraph JARs
        run: |
          for layer in l0:ml0 l1:cl1 data_l1:dl1; do
            module="${layer%%:*}"; target="${layer#*:}"
            jar=$(ls -1t modules/${module}/target/scala-2.13/*-assembly*.jar | head -1)
            cp "$jar" tessellation/docker/jars/${target}.jar
            echo "✓ ${target}.jar ($(stat -c%s "$jar") bytes)"
          done
          ls -la tessellation/docker/jars/

      # Start cluster with SKIP_ASSEMBLY since all JARs are pre-staged in docker/jars/.
      # --hypergraph-release sets TESSELLATION_VERSION for the Docker image tag.
      - name: Start cluster
        working-directory: tessellation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          just up --hypergraph-release="v${{ steps.versions.outputs.tessellation }}" \
            --skip-assembly --metagraph="${GITHUB_WORKSPACE}" --dl1 --data

      - name: Wait for cluster health
        run: |
          wait_for_node() {
            local name=$1 port=$2 max_wait=${3:-120}
            local iterations=$((max_wait / 2))
            for i in $(seq 1 $iterations); do
              if curl -sf "http://localhost:${port}/node/info" 2>/dev/null | grep -q '"state":"Ready"'; then
                echo "  ✓ $name (port $port): Ready"
                return 0
              fi
              sleep 2
            done
            echo "  ✗ $name (port $port): TIMEOUT after ${max_wait}s" && return 1
          }
          
          echo "Waiting for genesis nodes (120s timeout)..."
          wait_for_node "GL0" 9000 120
          wait_for_node "ML0" 9200 120
          wait_for_node "DL1-0" 9400 120
          
          echo ""
          echo "Waiting for DL1 validators (240s timeout - they have join delays)..."
          wait_for_node "DL1-1" 9410 240
          wait_for_node "DL1-2" 9420 240
          
      - name: Verify DL1 cluster size
        run: |
          echo "Verifying DL1 cluster formation..."
          CLUSTER_SIZE=$(curl -s http://localhost:9400/cluster/info | jq 'length' 2>/dev/null || echo "0")
          echo "DL1 cluster size: $CLUSTER_SIZE"
          
          if [ "$CLUSTER_SIZE" -lt 3 ]; then
            echo "::error::DL1 cluster size is $CLUSTER_SIZE (expected 3)"
            curl -s http://localhost:9400/cluster/info | jq . || true
            exit 1
          fi
          echo "✓ DL1 cluster has $CLUSTER_SIZE peers"

      - name: Verify ML0 ordinal progression
        run: |
          echo "Checking ML0 ordinal progression..."
          sleep 10
          ORD1=$(curl -sf http://localhost:9200/snapshots/latest 2>/dev/null | jq -r '.value.ordinal // .ordinal // empty' || echo "")
          if [ -z "$ORD1" ]; then
            echo "::warning::Could not fetch initial ML0 ordinal — skipping progression check"
          else
            echo "  Initial ordinal: $ORD1"
            sleep 30
            ORD2=$(curl -sf http://localhost:9200/snapshots/latest 2>/dev/null | jq -r '.value.ordinal // .ordinal // empty' || echo "")
            echo "  After 30s: $ORD2"
            if [ "$ORD1" = "$ORD2" ]; then
              echo "::warning::Ordinals haven't advanced ($ORD1), retrying after 30s grace period..."
              sleep 30
              ORD3=$(curl -sf http://localhost:9200/snapshots/latest 2>/dev/null | jq -r '.value.ordinal // .ordinal // empty' || echo "")
              echo "  After 60s total: $ORD3"
              if [ "$ORD1" = "$ORD3" ]; then
                echo "::error::ML0 consensus stalled — ordinal stuck at $ORD1 for 60 seconds"
                exit 1
              fi
              echo "  ✓ Ordinals advancing after grace period ($ORD1 → $ORD3)"
            else
              echo "  ✓ Ordinals advancing ($ORD1 → $ORD2)"
            fi
          fi

      - name: Install E2E dependencies
        working-directory: e2e-test
        run: npm ci

      - name: Run E2E tests
        working-directory: e2e-test
        run: npm test

      - name: Collect logs and diagnostics on failure
        if: failure()
        run: |
          echo "## 🔍 Failure Diagnostics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### ML0 Cluster Info" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          curl -sf http://localhost:9200/cluster/info 2>/dev/null | jq . >> $GITHUB_STEP_SUMMARY || echo "Failed to fetch" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "### GL0 Cluster Info" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          curl -sf http://localhost:9000/cluster/info 2>/dev/null | jq . >> $GITHUB_STEP_SUMMARY || echo "Failed to fetch" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "### DL1-0 Cluster Info" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          curl -sf http://localhost:9400/cluster/info 2>/dev/null | jq . >> $GITHUB_STEP_SUMMARY || echo "Failed to fetch" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "### Container Logs (last 50 lines)" >> $GITHUB_STEP_SUMMARY
          for container in gl0-0 ml0-0 dl1-0; do
            echo "#### $container" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            docker logs "$container" --tail 50 2>&1 >> $GITHUB_STEP_SUMMARY || echo "Container not found" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          done

          # Save full logs as files for artifact upload
          mkdir -p /tmp/ci-logs
          for container in gl0-0 ml0-0 dl1-0 dl1-1 dl1-2; do
            docker logs "$container" 2>&1 > /tmp/ci-logs/${container}.log || true
          done

      - name: Upload node logs
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-${{ github.run_number }}
          path: /tmp/ci-logs/
          retention-days: 14

      - name: Cleanup
        if: always()
        working-directory: tessellation
        run: just down || docker compose down -v || true
