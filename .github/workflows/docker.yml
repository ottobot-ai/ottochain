name: Build & Push Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: git sha)'
        required: false
        type: string
      tessellation_version:
        description: 'Override tessellation version (default: from versions.yaml)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: scasplte2/ottochain-metagraph

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version-input
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            RAW_VERSION="${{ inputs.tag }}"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            RAW_VERSION="${{ github.event.release.tag_name }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            RAW_VERSION="${GITHUB_REF#refs/tags/}"
          else
            RAW_VERSION=""
          fi
          echo "version=$RAW_VERSION" >> $GITHUB_OUTPUT
          CLEAN_VERSION="${RAW_VERSION#v}"
          echo "clean_version=$CLEAN_VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $CLEAN_VERSION"

      - name: Resolve tessellation version
        id: tess
        run: |
          if [ -n "${{ inputs.tessellation_version }}" ]; then
            TESS_VER="${{ inputs.tessellation_version }}"
            echo "Using override: $TESS_VER"
          else
            # Derive from actual dependency chain: Dependencies.scala → metakit POM → tessellation version
            echo "Resolving tessellation version from dependency chain..."
            METAKIT_VER=$(grep 'val metakit' project/Dependencies.scala | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "Metakit version: $METAKIT_VER"

            POM_URL="https://repo1.maven.org/maven2/io/constellationnetwork/metakit_2.13/${METAKIT_VER}/metakit_2.13-${METAKIT_VER}.pom"
            echo "Fetching POM: $POM_URL"
            TESS_VER=$(curl -sf "$POM_URL" | grep -A1 'tessellation-sdk' | grep '<version>' | sed 's/.*<version>\(.*\)<\/version>.*/\1/')

            if [ -z "$TESS_VER" ]; then
              echo "ERROR: Could not resolve tessellation version from metakit $METAKIT_VER POM"
              exit 1
            fi
            echo "Resolved: metakit $METAKIT_VER → tessellation $TESS_VER"
          fi

          # Ensure v prefix for GitHub release tag
          [[ "$TESS_VER" != v* ]] && TESS_VER="v${TESS_VER}"
          echo "version=$TESS_VER" >> $GITHUB_OUTPUT
          echo "Tessellation version: $TESS_VER"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}},value=${{ steps.version-input.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version-input.outputs.version }}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event.release.tag_name != '' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TESSELLATION_VERSION=${{ steps.tess.outputs.version }}
            OTTOCHAIN_VERSION=${{ steps.version-input.outputs.clean_version || '0.0.0-docker' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Always fetch fresh tessellation JARs - prevents stale cached versions
          no-cache-filters: tess-jars

      - name: Extract version from tag
        id: version
        if: startsWith(github.ref, 'refs/tags/v') || github.event.release.tag_name != '' || inputs.tag != ''
        run: |
          TAG="${{ inputs.tag || github.event.release.tag_name || github.ref }}"
          VERSION="${TAG#refs/tags/}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Notify deploy repo
        if: startsWith(github.ref, 'refs/tags/v') || github.event.release.tag_name != '' || inputs.tag != ''
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "⚠️ DEPLOY_REPO_TOKEN not set, skipping notification"
            exit 0
          fi
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token $DEPLOY_TOKEN" \
            https://api.github.com/repos/ottobot-ai/ottochain-deploy/dispatches \
            -d '{"event_type":"version-bump","client_payload":{"component":"ottochain","version":"${{ steps.version.outputs.version }}"}}'
          echo "✅ Notified deploy repo to bump ottochain to v${{ steps.version.outputs.version }}"

      - name: Summary
        run: |
          echo "## 🐳 Docker Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tessellation**: ${{ steps.tess.outputs.version }} (resolved from dependency chain)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags**:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.version.outputs.version }}" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📦 Version bump PR will be created in ottochain-deploy" >> $GITHUB_STEP_SUMMARY
          fi
